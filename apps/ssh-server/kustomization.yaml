apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ssh-server-cm.yaml
  - ssh-server-deploy.yaml
  - ssh-server-secret.yaml
  - ssh-server-svc.yaml
  - ssh-server-wstunnel-svc.yaml
  - ssh-server-ext-ing.yaml
patches:
  - path: ../../overlays/ing-external.yaml
    target:
      kind: Ingress
      labelSelector: type=external
transformers:
  - ../../global/ingress-domain-transformer-secret.yaml
