name: Push To Public Repo

on:
  push:
    branches: master

concurrency: 1


jobs:
  build:
    name: Push / deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
          persist-credentials: false
      - run:  ./scripts/rm-repo-secrets.sh
      - name: Do not move github action itselft
        run: rm -f .github/workflows/push-to-public-repo.yaml
      - name: Push changes to public repo
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN_MY_HOME_SERVER }}
          repository: v-garcia/home-server
          branch: ${{ github.ref }}
          force: true